  - id: tr-georgetown-2025
    name: "2025 Report on the State of the US Legal Market"
    publisher: Thomson Reuters Institute / Georgetown Law Center on Ethics
    year: 2025
    url: "https://www.legal.io/articles/5564524/State-of-the-Legal-Market-2025-Adapting-to-Change-Amid-Record-Profits"
    verified: true # WebFetch 2026-03-02 — all 5 stats confirmed exactly
    scope: "Annual review of US law firm financial performance, demand, billing rates, structural changes."
    methodology: "Peer Monitor data from large and mid-size US law firms. Not a survey — based on actual financial data."
    limitations: "US market only. Skewed toward large firms (Am Law 200 / NLJ 500). Does not cover high-street or small practices."
    keyFindings:
      - "Profits per lawyer grew 8.3% in 2024; PPE up 11.6%"
      - "Demand grew 2.6% — strongest genuine growth since before 2008"
      - "Billing rates up 6.5% despite weakening inflation"
      - "Non-equity partners rose from 14.3% to 19.1% (2005-2024); equity partners fell from 31.2% to 27.8%"

  # CORRECTED: Previously misattributed as "ICAEW Financial Benchmarking Survey" about accounting.
  # This is actually the Law Society Financial Benchmarking Survey about solicitors' law firms.
  # The ICAEW hosts it under /solicitors/ because they regulate solicitors' accounts.
  # The data (773 hours, PEP, fee income) describes LEGAL practices, not accounting firms.
  - id: law-society-fbs-2025
    name: "Financial Benchmarking Survey 2025"
    publisher: The Law Society (prepared by Hazlewoods)
    year: 2025
    url: "https://www.lawsociety.org.uk/topics/research/financial-benchmarking-survey-2025"
    verified: true # WebSearch 2026-03-02 — stats confirmed via Law Society page, Law Gazette, and Aquarius Reporting
    scope: "Financial data from 145 law firms across England and Wales with combined fee income of over £1.1bn."
    methodology: "Annual survey of law firms, prepared by Hazlewoods specialist accountants. Over 20 years of data."
    limitations: "UK solicitors' practices only. Does NOT cover accounting firms despite being hosted on ICAEW site. Average firm size £7.8m fee income."
    keyFindings:
      - "Median chargeable hours: 773 per fee earner per year (up from 765 in 2023)"
      - "Target chargeability: 1,000-1,200 hours/year — significant gap vs reality"
      - "Profit per equity partner up ~20% YoY (but flat when excluding client money interest)"
      - "Fee income median increase: 6%"
      - "Fee earners record 87% of client time and bill 86% of recorded time"

  - id: riba-benchmark-2025
    name: "RIBA Business Benchmarking 2025"
    publisher: RIBA (Royal Institute of British Architects)
    year: 2025
    url: "https://www.riba.org/work/insights-and-resources/riba-business-benchmarking/"
    verified: true # WebFetch 2026-03-02 — "£5 billion" confirmed on RIBA page. Billable % stats confirmed via RIBAJ article citing 2023 RIBA Business Benchmarking Report.
    scope: "UK architecture practices — utilisation, revenue, profitability, staff metrics."
    methodology: "Annual survey of RIBA Chartered Practices. UK-specific."
    limitations: "Architecture-focused. May not represent broader engineering or technical consultancy. Full report behind member access."
    keyFindings:
