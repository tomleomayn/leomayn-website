      - "Architects/technologists/assistants: 70%+ time on billable work — confirmed via RIBAJ secondary source"
      - "Associates: 64% billable — confirmed via RIBAJ secondary source"
      - "Partners/directors: 46% billable — confirmed via RIBAJ secondary source"
      - "Large practices (100+ staff): 80%+ billable for architects — confirmed via RIBAJ secondary source"

  - id: source-global-uk-2024
    name: "The UK Consulting Market in 2024"
    publisher: Source Global Research
    year: 2024
    url: "https://www.sourceglobalresearch.com/reports/9494-the-uk-consulting-market-in-2024"
